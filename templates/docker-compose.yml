version: '3.8'

services:
  shardix-app:
    build:
      context: .
      dockerfile: templates/Dockerfile
    ports:
      - "3000:3000"
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
